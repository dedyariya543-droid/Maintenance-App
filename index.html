<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance System</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:15px; }
h2 { text-align:center; }

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button { background:#007bff; color:#fff; font-weight:bold; border:none; }

.status-item { padding:10px; margin-top:8px; border-radius:8px; }
.ok { background:#e6f9ec; color:#2e7d32; }
.soon { background:#fff4e5; color:#ef6c00; }
.overdue { background:#fdecea; color:#c62828; }

.section-title { margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>🔧 Maintenance System (Cloud)</h2>

<div class="card">
  <input type="number" id="km" placeholder="Masukkan Odometer (km)">
  <button onclick="check()">CHECK</button>
</div>

<div class="card">
  <div id="output"></div>
</div>

<div class="card">
  <h3>Update Service</h3>
  <input type="date" id="date">

  <select id="item">
    <option value="oil_engine">Oil Engine</option>
    <option value="oil_final">Oil Final</option>
    <option value="spark_plug">Spark Plug</option>
    <option value="air_filter_replace">Air Filter Replace</option>
    <option value="drive_belt">Drive Belt</option>
    <option value="cvt_roller">CVT Roller</option>
    <option value="brake_fluid">Brake Fluid</option>
    <option value="battery">Battery</option>
  </select>

  <button onclick="updateService()">UPDATE</button>
</div>

<script type="module">

// ===== FIREBASE IMPORT =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyBHmj0TTEJA1gsaApcp2v5EwIcZVmhpzgw",
  authDomain: "maintenance-app-3ed93.firebaseapp.com",
  projectId: "maintenance-app-3ed93",
  storageBucket: "maintenance-app-3ed93.firebasestorage.app",
  messagingSenderId: "923977181209",
  appId: "1:923977181209:web:9ab0e2a61d0b9f19fc2288"
};

// ===== INIT =====
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== RULES =====
const replaceRules = {
  oil_engine: 4000,
  oil_final: 8000,
  spark_plug: 8000,
  air_filter_replace: 12000,
  drive_belt: 24000,
  cvt_roller: 22000
};

const timeRules = {
  brake_fluid: 730,
  battery: 600
};

// ===== SAVE =====
window.updateService = async function() {
  let km = parseInt(document.getElementById("km").value);
  let item = document.getElementById("item").value;
  let date = document.getElementById("date").value;

  if (isNaN(km) || !date) return alert("Lengkapi input");

  await addDoc(collection(db, "service"), {
    item, km, date, created: Date.now()
  });

  alert("✅ Data tersimpan ke cloud");
};

// ===== GET DATA =====
async function getData() {
  let snapshot = await getDocs(collection(db, "service"));
  let data = {};

  snapshot.forEach(doc => {
    let d = doc.data();
    if (!data[d.item]) data[d.item] = [];
    data[d.item].push(d);
  });

  return data;
}

// ===== CALC =====
function calcRemaining(km, history, interval) {
  if (!history || history.length === 0) {
    if (km % interval === 0) return 0;
    return interval - (km % interval);
  }
  let last = history[history.length - 1].km;
  return interval - (km - last);
}

// ===== TIME =====
function calcTime(item, history, daysLimit) {
  if (!history || history.length === 0) {
    return `<div class="status-item soon">${item} → NO DATA</div>`;
  }

  let last = new Date(history.slice(-1)[0].date + "T00:00:00");
  let now = new Date();

  let used = (now - last) / (1000*60*60*24);
  let remain = Math.floor(daysLimit - used);

  let next = new Date(last);
  next.setDate(next.getDate() + daysLimit);

  let nextText = next.toLocaleDateString("id-ID");

  let status = remain <= 0 ? "🔴 GANTI" :
               remain <= 30 ? "🟡 SEGERA" :
               "🟢 OK";

  let css = remain <= 0 ? "overdue" :
            remain <= 30 ? "soon" : "ok";

  return `<div class="status-item ${css}">
    ${item} → ${status} (${remain} hari)<br>
    Next: ${nextText}
  </div>`;
}

// ===== MAIN =====
window.check = async function() {
  let km = parseInt(document.getElementById("km").value);
  if (isNaN(km)) return alert("Masukkan KM");

  let data = await getData();
  let output = "";

  output += "<div class='section-title'>KM Based</div>";

  for (let item in replaceRules) {
    let rem = calcRemaining(km, data[item], replaceRules[item]);

    let status = rem <= 0 ? "🔴 GANTI" :
                 rem <= 500 ? "🟡 SEGERA" :
                 "🟢 OK";

    let css = rem <= 0 ? "overdue" :
              rem <= 500 ? "soon" : "ok";

    output += `<div class="status-item ${css}">
      ${item} → ${status} (sisa ${rem} km)
    </div>`;
  }

  output += "<div class='section-title'>Time Based</div>";

  for (let item in timeRules) {
    output += calcTime(item, data[item], timeRules[item]);
  }

  document.getElementById("output").innerHTML = output;
};

</script>

</body>
</html>
