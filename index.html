<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance System</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:15px; }
h2 { text-align:center; }

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button { background:#007bff; color:#fff; font-weight:bold; border:none; }

.reset { background:#dc3545; }

.status-item {
  padding:10px;
  margin-top:8px;
  border-radius:8px;
}

.ok { background:#e6f9ec; color:#2e7d32; }
.soon { background:#fff4e5; color:#ef6c00; }
.overdue { background:#fdecea; color:#c62828; }

.section-title { margin-top:10px; font-weight:bold; }
canvas { margin-top:10px; background:#fff; border-radius:10px; }
</style>
</head>

<body>

<h2>🔧 MAINTENANCE CHECK FOR BEAT DELUXE</h2>

<div class="card">
  <input type="number" id="km" placeholder="Masukkan Odometer (km)">
  <button onclick="check()">CHECK</button>
</div>

<div class="card">
  <div id="output"></div>
</div>

<div class="card">
  <h3>Update Service</h3>

  <input type="date" id="date">

  <select id="item">
    <option value="oil_engine">Oil Engine</option>
    <option value="oil_final">Oil Final</option>
    <option value="spark_plug">Spark Plug</option>
    <option value="air_filter_replace">Air Filter Replace</option>
    <option value="drive_belt">Drive Belt / V-Belt</option>
    <option value="cvt_roller">Roller CVT</option>

    <option value="routine_check">Routine Check</option>
    <option value="air_filter_clean">Air Filter Clean</option>
    <option value="brake_pad">Brake Pad</option>
    <option value="drive_belt_check">Drive Belt Check</option>
    <option value="cvt_roller_check">CVT Roller Check</option>

    <option value="brake_fluid">Brake Fluid</option>
    <option value="battery">Battery</option>
  </select>

  <button onclick="updateService()">UPDATE</button>

  <button onclick="resetItem()">RESET ITEM</button>
  <button onclick="resetAll()" class="reset">RESET ALL DATA</button>
</div>

<div class="card">
  <h3>📊 Trend Grafik (Oil Engine)</h3>
  <canvas id="chart" width="300" height="200"></canvas>
</div>

<script>

// ===== RULES =====
const replaceRules = {
  oil_engine: 4000,
  oil_final: 8000,
  spark_plug: 8000,
  air_filter_replace: 12000,
  drive_belt: 24000,
  cvt_roller: 22000
};

const inspectRules = {
  routine_check: 4000,
  air_filter_clean: 4000,
  brake_pad: 4000,
  drive_belt_check: 8000,
  cvt_roller_check: 8000
};

const timeRules = {
  brake_fluid: 730,
  battery: 600
};

// ===== STORAGE =====
function getData() {
  return JSON.parse(localStorage.getItem("data") || "{}");
}

function saveData(data) {
  localStorage.setItem("data", JSON.stringify(data));
}

// ===== UPDATE =====
function updateService() {
  let km = parseInt(document.getElementById("km").value);
  let item = document.getElementById("item").value;
  let dateInput = document.getElementById("date").value;

  if (isNaN(km)) return alert("Masukkan KM");
  if (!dateInput) return alert("Pilih tanggal");

  let data = getData();
  if (!data[item]) data[item] = [];

  data[item].push({ km: km, date: dateInput });

  saveData(data);
  alert("✅ Service tersimpan");
}

// ===== RESET =====
function resetItem() {
  let item = document.getElementById("item").value;
  let data = getData();

  if (!data[item]) return alert("Tidak ada data");

  if (confirm("Hapus data " + item + "?")) {
    delete data[item];
    saveData(data);
    alert("Data dihapus");
  }
}

function resetAll() {
  if (confirm("⚠️ Hapus SEMUA data?")) {
    localStorage.removeItem("data");
    alert("Semua data dihapus");
  }
}

// ===== CALC =====
function calcRemaining(km, history, interval) {
  if (!history || history.length === 0) {
    if (km % interval === 0) return 0;
    return interval - (km % interval);
  }
  let last = history[history.length - 1].km;
  return interval - (km - last);
}

// ===== TREND =====
function getTrend(item) {
  let data = getData();
  if (!data[item] || data[item].length < 2) return "Belum cukup data";
  let last = data[item].slice(-1)[0].km;
  let prev = data[item].slice(-2)[0].km;
  return (last - prev) + " km";
}

// ===== TIME BASED =====
function checkTime() {
  let data = getData();
  let output = "";

  for (let item in timeRules) {
    let daysLimit = timeRules[item];
    let history = data[item];

    let status="", css="", nextText="";

    if (!history || history.length === 0) {
      status = "🟡 NO DATA";
      css = "soon";
      nextText = "Tidak ada histori";
    } else {
      let lastDate = new Date(history.slice(-1)[0].date + "T00:00:00");
      let now = new Date();

      let used = (now - lastDate) / (1000*60*60*24);
      let remaining = Math.floor(daysLimit - used);

      let nextDate = new Date(lastDate);
      nextDate.setDate(nextDate.getDate() + daysLimit);

      let nextFormatted = nextDate.toLocaleDateString("id-ID", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      nextText = "Next: " + nextFormatted;

      if (remaining <= 0) {
        status = "🔴 SERVICE NOW";
        css = "overdue";
      } else if (remaining <= 30) {
        status = "🟡 SOON (" + remaining + " hari)";
        css = "soon";
      } else {
        status = "🟢 OK (" + remaining + " hari)";
        css = "ok";
      }
    }

    output += `
    <div class="status-item ${css}">
      <b>${format(item)}</b><br>
      ${status}<br>
      ${nextText}
    </div>`;
  }

  return output;
}

// ===== GRAPH =====
function drawChart() {
  let canvas = document.getElementById("chart");
  let ctx = canvas.getContext("2d");

  let data = getData();
  let arr = data.oil_engine || [];

  ctx.clearRect(0,0,300,200);
  ctx.beginPath();
  ctx.moveTo(0,180);

  arr.forEach((d,i)=>{
    ctx.lineTo(i*40,180 - d.km/100);
  });

  ctx.strokeStyle = "blue";
  ctx.stroke();
}

// ===== MAIN =====
function check() {
  let km = parseInt(document.getElementById("km").value);
  if (isNaN(km)) return alert("Masukkan KM");

  let data = getData();
  let output = "";

  output += "<div class='section-title'>🔁 Replacement</div>";

  for (let item in replaceRules) {
    let rem = calcRemaining(km, data[item], replaceRules[item]);

    let status="", css="";
    if (rem <= 0) { status="🔴 REPLACE NOW"; css="overdue"; }
    else if (rem <= 500) { status="🟡 SOON"; css="soon"; }
    else { status="🟢 OK"; css="ok"; }

    output += `<div class="status-item ${css}">
      <b>${format(item)}</b><br>
      ${status} (sisa ${rem} km)
    </div>`;
  }

  output += "<div class='section-title'>🔍 Inspection</div>";

  for (let item in inspectRules) {
    let rem = calcRemaining(km, data[item], inspectRules[item]);

    let status="", css="";
    if (rem <= 0) { status="🔴 CHECK NOW"; css="overdue"; }
    else if (rem <= 200) { status="🟡 SOON"; css="soon"; }
    else { status="🟢 OK"; css="ok"; }

    output += `<div class="status-item ${css}">
      <b>${format(item)}</b><br>
      ${status} (sisa ${rem} km)
    </div>`;
  }

  output += "<div class='section-title'>📈 Trend</div>";
  output += "Oil Engine interval terakhir: " + getTrend("oil_engine");

  output += "<div class='section-title'>⏱️ Time-Based</div>";
  output += checkTime();

  document.getElementById("output").innerHTML = output;

  drawChart();
}

// ===== FORMAT =====
function format(t) {
  return t.replace(/_/g," ").toUpperCase();
}

</script>

</body>
</html>
